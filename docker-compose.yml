version: '3.8'

services:
  # ============================================================
  # Streamlit-Anwendung
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foerdermittel-kompass-app
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=foerdermittel
      - DB_USER=foerdermittel
      - DB_PASSWORD=foerdermittel
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=llama3
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # PostgreSQL-Datenbank
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: foerdermittel-kompass-db
    environment:
      POSTGRES_DB: foerdermittel
      POSTGRES_USER: foerdermittel
      POSTGRES_PASSWORD: foerdermittel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foerdermittel -d foerdermittel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Ollama KI-Server (lokal, DSGVO-konform)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: foerdermittel-kompass-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Worker: Periodische Quell-Aktualisierung (optional)
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foerdermittel-kompass-worker
    entrypoint: ["python", "-m", "scripts.scheduler"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=foerdermittel
      - DB_USER=foerdermittel
      - DB_PASSWORD=foerdermittel
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
